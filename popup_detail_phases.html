                result: "Định vị rõ mục tiêu phát triển mới, hướng đến tăng trưởng chất lượng cao và bền vững hơn.",
                leaders: ["Khối chiến lược phát triển", "Hệ sinh thái doanh nghiệp"],
                location: "Việt Nam",
                stats: [{ label: "Tầm nhìn", value: "2025-2030" }, { label: "Động lực", value: "Số + Xanh" }]
            }
        };

        const params = new URLSearchParams(window.location.search);
        const phase = params.get('phase') || 'tu-lieu';
        const data = phaseData[phase] || phaseData['tu-lieu'];

        const heroBg = document.getElementById('hero-bg');
        const eventLabel = document.getElementById('event-label');
        const heroTitle = document.getElementById('hero-title');
        const contextText = document.getElementById('context-text');
        const policyGrid = document.getElementById('policy-grid');
        const resultText = document.getElementById('result-text');
        const leaderList = document.getElementById('leader-list');
        const locationText = document.getElementById('location-text');
        const statsList = document.getElementById('stats-list');

        heroBg.style.backgroundImage = `linear-gradient(to bottom, rgba(22, 10, 10, 0.2), rgba(22, 10, 10, 1)), url('${data.image}')`;
        eventLabel.textContent = data.label;
        heroTitle.textContent = data.title;
        contextText.textContent = data.context;
        resultText.textContent = data.result;
        locationText.textContent = data.location;

        policyGrid.innerHTML = data.policies.map(item => `
            <div class="bg-white/5 border border-white/10 p-5 rounded-xl flex gap-4 hover:bg-white/10 transition-colors">
                <div class="bg-primary/20 text-primary p-3 rounded-lg h-fit">
                    <span class="material-symbols-outlined">${item.icon}</span>
                </div>
                <div>
                    <h3 class="font-bold text-lg mb-1">${item.title}</h3>
                    <p class="text-slate-400 text-sm">${item.desc}</p>
                </div>
            </div>
        `).join('');

        leaderList.innerHTML = data.leaders.map(name => `
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30">
                    <span class="material-symbols-outlined text-primary">person</span>
                </div>
                <div>
                    <p class="font-bold text-sm">${name}</p>
                    <p class="text-xs text-slate-400">Nhân vật tiêu biểu</p>
                </div>
            </div>
        `).join('');

        statsList.innerHTML = data.stats.map(stat => `
            <div>
                <div class="flex justify-between text-xs mb-1.5 font-bold">
                    <span>${stat.label}</span>
                    <span class="text-primary">${stat.value}</span>
                </div>
                <div class="w-full bg-white/10 h-1.5 rounded-full overflow-hidden">
                    <div class="bg-primary h-full w-[88%]"></div>
                </div>
            </div>
        `).join('');

    </script>
</body>

</html>
